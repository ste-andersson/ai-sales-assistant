SpeechToText:
  START: "Jag hade just ett möte med Svante Jonsson på ICA Sverige och de är intresserade av att ta in tre konsulter efter sommaren. Vi har ett nytt möte 3:e juni 15:00 på deras kontor. Påminn mig om att jag behöver kolla med Hanna på torsdag förmiddag om hon är tillgänglig och att jag också måste kolla med Torbjörn i mitten av nästa vecka om han är intresserad av ett underkonsultuppdrag."
  APPROVAL: "Det blir jättebra! Jag godkänner det!"